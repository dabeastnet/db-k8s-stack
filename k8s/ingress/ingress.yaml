apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: db-app
  namespace: db-stack
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: 4m
    # Uncomment and set a real issuer once cert-manager is installed:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  # tls:                        # Uncomment when cert-manager is ready
  #   - hosts:
  #       - app.example.com
  #     secretName: db-app-tls
  rules:
    # Named-host rule: used when accessed via the real domain (Cloudflare Tunnel).
    - host: project.beckersd.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: db-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: db-frontend
                port:
                  number: 80
    # Catch-all rule (no host): matches localhost, IP addresses, and any other
    # hostname — used for local access via http://localhost:18080.
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: db-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: db-frontend
                port:
                  number: 80