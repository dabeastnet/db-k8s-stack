apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: db-app
  namespace: db-stack
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 4m
spec:
  tls:
    - hosts:
        - app.example.com
      secretName: db-app-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: db-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: db-frontend
                port:
                  number: 80