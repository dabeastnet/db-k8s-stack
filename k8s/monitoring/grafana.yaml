---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-grafana-datasources
  namespace: monitoring
  labels:
    app: db-grafana
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://db-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-grafana-dashboard-provider
  namespace: monitoring
  labels:
    app: db-grafana
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-grafana-dashboard
  namespace: monitoring
  labels:
    app: db-grafana
data:
  overview.json: |
    {
      "title": "db-k8s-stack Overview",
      "uid": "db-k8s-overview",
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 38,
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Running Pods (db-stack)",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(kube_pod_status_phase{namespace=\"db-stack\",phase=\"Running\"})"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Ready Nodes",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"})"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "red", "value": 0}, {"color": "yellow", "value": 1}, {"color": "green", "value": 2}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "API Requests (last 5m)",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(increase(db_api_requests_total[5m]))"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "blue", "value": 0}]}}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pod Restarts (last 1h, db-stack)",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"db-stack\"}[1h]))"}],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Node CPU Usage %",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "100 * (1 - avg by(node)(rate(node_cpu_seconds_total{job=\"kubernetes-nodes\",mode=\"idle\"}[5m])))", "legendFormat": "{{node}}"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "color": {"mode": "palette-classic"}}}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Node Memory Usage %",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "100 * (1 - node_memory_MemAvailable_bytes{job=\"kubernetes-nodes\"} / node_memory_MemTotal_bytes{job=\"kubernetes-nodes\"})", "legendFormat": "{{node}}"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "color": {"mode": "palette-classic"}}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "API Request Rate (req/s)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum by(endpoint)(rate(db_api_requests_total[5m]))", "legendFormat": "{{endpoint}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "color": {"mode": "palette-classic"}}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Node Disk I/O (bytes/s)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by(node)(rate(node_disk_read_bytes_total{job=\"kubernetes-nodes\"}[5m]))", "legendFormat": "{{node}} read"},
            {"expr": "sum by(node)(rate(node_disk_written_bytes_total{job=\"kubernetes-nodes\"}[5m]))", "legendFormat": "{{node}} write"}
          ],
          "fieldConfig": {"defaults": {"unit": "Bps", "color": {"mode": "palette-classic"}}}
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-grafana
  namespace: monitoring
  labels:
    app: db-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-grafana
  template:
    metadata:
      labels:
        app: db-grafana
    spec:
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: datasources
          configMap:
            name: db-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: db-grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: db-grafana-dashboard

---
apiVersion: v1
kind: Service
metadata:
  name: db-grafana
  namespace: monitoring
  labels:
    app: db-grafana
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: http
      nodePort: 30030
  selector:
    app: db-grafana
