##
# Prometheus configuration and deployment
#
# This manifest defines a basic Prometheus setup for monitoring the Kubernetes
# cluster and the application stack.  It includes:
#
# * A ConfigMap containing the Prometheus configuration (prometheus.yml).
# * A ServiceAccount, ClusterRole and ClusterRoleBinding granting Prometheus
#   read-only access to Kubernetes APIs required for service discovery.
# * A Deployment running a single Prometheus instance configured to scrape
#   metrics from the node-exporter, kube‑state‑metrics and the db-api service.
# * A Service exposing the Prometheus web UI on port 9090 within the cluster.
#
# The monitoring stack lives in the ``monitoring`` namespace which is created
# separately in ``namespace.yaml``.  To deploy this stack, run:
#
#   kubectl apply -f k8s/monitoring/namespace.yaml
#   kubectl apply -f k8s/monitoring/prometheus.yaml
#
# Prometheus stores its data in an emptyDir volume, which means metrics will be
# lost if the Pod restarts.  For a production environment you might replace
# emptyDir with a PersistentVolumeClaim.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-prometheus-config
  namespace: monitoring
  labels:
    app: db-prometheus
    app.kubernetes.io/component: server
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Scrape kube-state-metrics for cluster state
      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - db-kube-state-metrics.monitoring.svc.cluster.local:8080

      # Scrape the db-api service for application metrics.
      - job_name: db-api
        metrics_path: /metrics
        static_configs:
          - targets:
              - db-api.db-stack.svc.cluster.local:80

      # Auto-discover all cluster nodes and scrape node-exporter on port 9100.
      # Relabeling adds a human-readable "node" label from the node hostname
      # so graphs show "cp1 / worker1 / worker2" instead of raw IP addresses.
      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: '(.*):\d+'
            target_label: __address__
            replacement: '${1}:9100'
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-prometheus
  namespace: monitoring
  labels:
    app: db-prometheus

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: db-prometheus
  labels:
    app: db-prometheus
rules:
  # Allow Prometheus to discover nodes, pods, services and endpoints.
  - apiGroups: ['']
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ['get', 'list', 'watch']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: db-prometheus
  labels:
    app: db-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: db-prometheus
subjects:
  - kind: ServiceAccount
    name: db-prometheus
    namespace: monitoring

---
apiVersion: apps/v1
kind: Deployment
metadata:
  # Prefix the deployment name so the resulting pods start with "db-".
  name: db-prometheus
  namespace: monitoring
  labels:
    app: db-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-prometheus
  template:
    metadata:
      labels:
        app: db-prometheus
    spec:
      serviceAccountName: db-prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.listen-address=0.0.0.0:9090
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: data-volume
              mountPath: /prometheus
      volumes:
        - name: config-volume
          configMap:
            name: db-prometheus-config
        - name: data-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: db-prometheus
  namespace: monitoring
  labels:
    app: db-prometheus
spec:
  # Expose Prometheus via a NodePort so it can be accessed from outside the
  # cluster without requiring a kubectl port-forward.  The Vagrantfile will
  # forward this NodePort to a host port for local access.
  type: NodePort
  ports:
    - name: web
      port: 9090
      targetPort: web
      # Explicitly set a nodePort in the 30000-32767 range.  This port will
      # be forwarded in the Vagrantfile to the host for convenience.
      nodePort: 30090
  selector:
    app: db-prometheus