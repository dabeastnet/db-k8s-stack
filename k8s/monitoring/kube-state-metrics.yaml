##
# kube-state-metrics deployment
#
# kube-state-metrics is an add‑on agent that listens to the Kubernetes API
# server and generates metrics about the state of the objects.  Prometheus
# scrapes these metrics to provide insight into cluster health.  This manifest
# deploys kube-state-metrics with minimal RBAC privileges and a Service to
# expose its metrics on port 8080.  Resources are namespaced under
# ``monitoring`` but the ClusterRole grants read‑only access across the
# cluster.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: monitoring
  labels:
    app: kube-state-metrics

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
  labels:
    app: kube-state-metrics
rules:
  # Allow read‑only access to most Kubernetes resources.  This set of
  # permissions is a trimmed down subset of the full kube-state-metrics
  # ruleset and is sufficient for basic monitoring.  Additional resources
  # can be added here if required.
  - apiGroups: ['']
    resources:
      - nodes
      - pods
      - services
      - endpoints
      - namespaces
      - replicationcontrollers
      - resourcequotas
      - limitranges
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ['list', 'watch']
  - apiGroups: ['apps']
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ['list', 'watch']
  - apiGroups: ['batch']
    resources:
      - jobs
      - cronjobs
    verbs: ['list', 'watch']
  - apiGroups: ['autoscaling']
    resources:
      - horizontalpodautoscalers
    verbs: ['list', 'watch']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
  labels:
    app: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: monitoring

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: monitoring
  labels:
    app: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          #
          # Use the official image hosted on the Kubernetes community
          # container registry.  The original manifest referenced
          # quay.io/coreos which may not be reachable in restricted
          # environments, causing an ErrImagePull.  See
          # https://github.com/kubernetes/kube-state-metrics/releases
          # for available tags.  If your cluster has network
          # restrictions or a private registry, adjust the image
          # accordingly.
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.10.1
          ports:
            - name: http
              containerPort: 8080
          # Expose metrics at /metrics on port 8080 (default).  No
          # additional arguments are required for basic usage.

---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: monitoring
  labels:
    app: kube-state-metrics
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: kube-state-metrics