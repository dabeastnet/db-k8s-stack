apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-frontend
  namespace: db-stack
  labels:
    app: db-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-frontend
  template:
    metadata:
      labels:
        app: db-frontend
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: db-frontend
          image: ghcr.io/dabeastnet/db-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"