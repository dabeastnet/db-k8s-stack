apiVersion: v1
kind: Service
metadata:
  name: db-frontend
  namespace: db-stack
  labels:
    app: db-frontend
spec:
  # ClusterIP: the frontend is now accessed through the nginx ingress controller
  # rather than directly via a NodePort.  The ingress routes / to this service
  # and /api/ directly to db-api, so external traffic enters on the ingress
  # NodePort (30080/30443) and is dispatched internally.
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: db-frontend