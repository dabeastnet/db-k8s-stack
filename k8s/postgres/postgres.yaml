# Define a hostPath PersistentVolume for the PostgreSQL data directory.  A
# dynamic provisioner is not installed in this cluster, so without a PV the
# PersistentVolumeClaim would remain pending.  This volume uses the
# host directory `/mnt/postgres-data`, which is created during Vagrant
# provisioning in provision-common.sh.  The storageClassName "manual" is
# arbitrary and used to bind the PVC below.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-postgres-pv
  labels:
    app: db-postgres
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/postgres-data

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-postgres-pvc
  namespace: db-stack
  labels:
    app: db-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: manual

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-postgres
  namespace: db-stack
spec:
  serviceName: db-postgres
  replicas: 1
  selector:
    matchLabels:
      app: db-postgres
  template:
    metadata:
      labels:
        app: db-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: db-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-app-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-app-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-app-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: db-postgres
  namespace: db-stack
  labels:
    app: db-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: db-postgres